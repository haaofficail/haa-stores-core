# Haa Stores — Production stack
# ---------------------------------------------------------------------------
# Mirrors staging but targets haastores.com. Key differences from staging:
#
#   - No MinIO: production uses an external S3-compatible bucket (Cloudflare R2
#     or AWS S3). STORAGE_DRIVER=s3 is required; local is rejected by env.ts.
#   - ALLOW_NOOP_QUEUE=false: all queue jobs must have a live Redis back-end.
#   - No PAYMENT_PROVIDER=fake: env.ts rejects fake providers in production.
#   - Images tagged with the exact commit SHA by the deploy workflow.
#
# This file is NEVER executed directly in development. It is pulled to the
# production server by the deploy workflow and driven by `docker compose -p
# haa-production pull && docker compose -p haa-production up -d`.
#
# DNS A records required before first deploy:
#   haastores.com           A  <production-server-ip>
#   admin.haastores.com     A  <production-server-ip>
#   merchant.haastores.com  A  <production-server-ip>
#
# SCOPE: PRODUCTION ONLY. No staging resources are touched.
name: haa-production

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-haastores_prod}
      POSTGRES_USER: ${POSTGRES_USER:-haa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - haa_prod_pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-haa} -d ${POSTGRES_DB:-haastores_prod}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [haa-prod]

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - haa_prod_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [haa-prod]

  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-haaofficail/haa-stores}-api:${IMAGE_TAG:?IMAGE_TAG required}
    restart: always
    env_file: [.env]
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fs http://localhost:${API_PORT:-3001}/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [haa-prod]

  storefront:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-haaofficail/haa-stores}-storefront:${IMAGE_TAG:?IMAGE_TAG required}
    restart: always
    networks: [haa-prod]

  admin-dashboard:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-haaofficail/haa-stores}-admin-dashboard:${IMAGE_TAG:?IMAGE_TAG required}
    restart: always
    networks: [haa-prod]

  merchant-dashboard:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-haaofficail/haa-stores}-merchant-dashboard:${IMAGE_TAG:?IMAGE_TAG required}
    restart: always
    networks: [haa-prod]

  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on: [api, storefront, admin-dashboard, merchant-dashboard]
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - haa_prod_caddy_data:/data
      - haa_prod_caddy_config:/config
    networks: [haa-prod]

volumes:
  haa_prod_pg_data:
  haa_prod_redis_data:
  haa_prod_caddy_data:
  haa_prod_caddy_config:

networks:
  haa-prod:
    driver: bridge
