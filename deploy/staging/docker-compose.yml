# Haa Stores — Staging stack
# ---------------------------------------------------------------------------
# Pulls the application images from GHCR and runs them behind a Caddy reverse
# proxy with automatic TLS. Lives on the staging server at /srv/haa-stores and
# is driven by .github/workflows/deploy.yml (the deploy-staging job), which
# exports REGISTRY / IMAGE_PREFIX / IMAGE_TAG into the SSH session before
# running `docker compose pull && docker compose up -d`.
#
# Compose auto-loads the sibling `.env` file for the remaining configuration
# (DB credentials, API secrets, public URLs). Shell-exported variables (e.g.
# IMAGE_TAG=sha-abc1234 from the deploy job) take precedence over .env, so a
# real deploy pins the exact image while manual runs fall back to :latest.
#
# Scope: STAGING ONLY. Does not touch production and never removes services it
# did not create.
name: haa-staging

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-haastores}
      POSTGRES_USER: ${POSTGRES_USER:-haa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in deploy/staging/.env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    # Bound to localhost only — lets an operator run DB migrations from a repo
    # checkout on the server without exposing Postgres to the internet.
    # Host port 5433 to avoid clashing with a pre-existing host Postgres on 5432.
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - haa_pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-haa} -d ${POSTGRES_DB:-haastores}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [haa]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - haa_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [haa]

  # S3-compatible object storage. The API forbids STORAGE_DRIVER=local in
  # staging/production, so staging ships a self-contained MinIO instead of
  # depending on an external bucket. Credentials come from .env.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-haaadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in .env}
    volumes:
      - haa_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [haa]

  # One-shot: create the staging bucket, then exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-haaadmin} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/${S3_BUCKET:-haa-staging} &&
      mc anonymous set download local/${S3_BUCKET:-haa-staging} &&
      echo 'bucket ready';
      "
    restart: "no"
    networks: [haa]

  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-haaofficail/haa-stores}-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: [.env]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fs http://localhost:${API_PORT:-3001}/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [haa]

  storefront:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-haaofficail/haa-stores}-storefront:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks: [haa]

  admin-dashboard:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-haaofficail/haa-stores}-admin-dashboard:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks: [haa]

  merchant-dashboard:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-haaofficail/haa-stores}-merchant-dashboard:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks: [haa]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [api, storefront, admin-dashboard, merchant-dashboard]
    # The host uses a systemd-resolved stub (127.0.0.53) that isn't reachable
    # from inside containers, which breaks Caddy's outbound ACME calls. Pin
    # public resolvers so certificate issuance can reach Let's Encrypt.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - haa_caddy_data:/data
      - haa_caddy_config:/config
    networks: [haa]

volumes:
  haa_pg_data:
  haa_redis_data:
  haa_minio_data:
  haa_caddy_data:
  haa_caddy_config:

networks:
  haa:
    driver: bridge
