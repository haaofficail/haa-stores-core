# nginx config for haastores.com
# Place at: /etc/nginx/sites-available/haastores.com
# Enable: ln -s /etc/nginx/sites-available/haastores.com /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name haastores.com www.haastores.com merchant.haastores.com admin.haastores.com;
    # certbot will upgrade this to HTTPS automatically
    return 301 https://$host$request_uri;
}

# ── Main storefront ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name haastores.com www.haastores.com;
    # SSL filled by certbot
    # ssl_certificate ...

    root /home/haa/app/repo/apps/storefront/dist;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Storage files served by API
    location /storage/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}

# ── Merchant dashboard ───────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name merchant.haastores.com;

    root /home/haa/app/repo/apps/merchant-dashboard/dist;
