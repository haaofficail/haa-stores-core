name: Ops — Staging DB Migrate

# Owner-triggered (workflow_dispatch only) — never auto-runs.
# Applies pending Drizzle migrations against the staging database.
# Use this when a schema PR has merged but the migration hasn't been
# executed yet (per AGENTS.md §14.7: agent-authored PRs ship the SQL
# but never run db:migrate on a live env).
#
# Safety:
#   - Workflow only runs on workflow_dispatch (no auto-trigger).
#   - The remote shell sets `set -euo pipefail` so a failed step exits.
#   - Optional `dry_run` input runs `drizzle-kit migrate --dry-run` to
#     preview what would happen without writing.
#   - Database backup is captured inside the postgres container before
#     the migration runs, under /var/lib/postgresql/data/backup-pre-<RUN>.sql.
#   - On failure, the workflow stops; rollback is owner-driven from the
#     backup file (logged in the job summary).

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment"
        type: choice
        options: [staging, production]
        default: staging
      dry_run:
        description: "Dry-run only (no DB writes)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  migrate:
    name: Migrate ${{ inputs.target }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.target }}
    env:
      DEPLOY_HOST: ${{ inputs.target == 'production' && secrets.PRODUCTION_HOST || secrets.STAGING_HOST }}
      DEPLOY_USER: ${{ inputs.target == 'production' && secrets.PRODUCTION_USER || secrets.STAGING_USER }}
      DEPLOY_PATH: ${{ inputs.target == 'production' && secrets.PRODUCTION_DEPLOY_PATH || secrets.STAGING_DEPLOY_PATH }}
      PROJECT_NAME: ${{ inputs.target == 'production' && 'haa-production' || 'haa-staging' }}
      SSH_KEY: ${{ inputs.target == 'production' && secrets.PRODUCTION_SSH_KEY || secrets.STAGING_SSH_KEY }}
      DRY_RUN: ${{ inputs.dry_run }}
      RUN_ID: ${{ github.run_id }}
      TARGET: ${{ inputs.target }}

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.SSH_KEY }}

      - name: Add server to known hosts (pre-baked, no probing)
        env:
          STAGING_KNOWN_HOSTS: ${{ secrets.STAGING_KNOWN_HOSTS }}
          PRODUCTION_KNOWN_HOSTS: ${{ secrets.PRODUCTION_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Prefer the pre-baked KNOWN_HOSTS secret so ssh-keyscan never
          # runs (ssh-keyscan probing is what triggers staging's fail2ban
          # and turns every retried deploy into a 90 s wait).
          if [ "$TARGET" = "production" ]; then
            HOSTS="${PRODUCTION_KNOWN_HOSTS:-}"
          else
            HOSTS="${STAGING_KNOWN_HOSTS:-}"
          fi
          if [ -n "$HOSTS" ]; then
            printf '%s\n' "$HOSTS" >> ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts
          else
            # Fallback only if the secret isn't set yet. Use accept-new
            # so first connect is non-fatal, but warn loudly.
            ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
            echo "⚠ STAGING_KNOWN_HOSTS not set — used ssh-keyscan fallback. Risk: fail2ban window."
          fi

      - name: Snapshot DB before migrate
        run: |
          ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "PROJECT='$PROJECT_NAME' RUN_ID='$RUN_ID' bash -s" <<'SNAP'
            set -euo pipefail
            cd "/srv/haa-stores"  # canonical staging deploy path
            BACKUP="/var/lib/postgresql/data/backup-pre-${RUN_ID}.sql"
            echo "==> Capturing pre-migration snapshot at $BACKUP"
            # Read DB creds from the deployed .env (never echoed).
            set -a; . ./.env; set +a
            docker compose -p "$PROJECT" exec -T postgres \
              pg_dump -U "${POSTGRES_USER:-haa}" "${POSTGRES_DB:-haastores}" \
              > "/tmp/${RUN_ID}.sql"
            docker compose -p "$PROJECT" exec -T postgres \
              bash -c "cat > '$BACKUP'" < "/tmp/${RUN_ID}.sql"
            BACKUP_SIZE=$(wc -c < "/tmp/${RUN_ID}.sql")
            rm -f "/tmp/${RUN_ID}.sql"
            echo "==> Backup captured: ${BACKUP_SIZE} bytes"
            echo "==> Restore command (owner-only, never auto-run):"
            echo "    docker compose -p $PROJECT exec -T postgres psql -U \$POSTGRES_USER \$POSTGRES_DB < $BACKUP"
          SNAP

      - name: Run migration
        run: |
          ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "PROJECT='$PROJECT_NAME' DRY_RUN='$DRY_RUN' bash -s" <<'MIGRATE'
            set -euo pipefail
            cd "/srv/haa-stores"
            set -a; . ./.env; set +a

            # Build DATABASE_URL from the deployed compose env so
            # drizzle-kit hits the in-container postgres.
            export DATABASE_URL="postgres://${POSTGRES_USER:-haa}:${POSTGRES_PASSWORD}@127.0.0.1:5433/${POSTGRES_DB:-haastores}"

            # CRITICAL: `docker compose exec -T` inherits stdin, which means
            # when called inside `ssh ... bash -s <<HEREDOC` it eats the
            # rest of the heredoc and bash silently runs nothing further.
            # Every exec call below MUST `</dev/null` to release stdin.

            echo "==> Pre-migration journal head:"
            docker compose -p "$PROJECT" exec -T postgres \
              psql -U "${POSTGRES_USER:-haa}" "${POSTGRES_DB:-haastores}" \
              -c "SELECT hash, created_at FROM drizzle.__drizzle_migrations ORDER BY created_at DESC LIMIT 5" \
              </dev/null 2>/dev/null || echo "  (no drizzle.__drizzle_migrations table yet)"

            echo "==> Migrating (dry_run=$DRY_RUN)"
            if [ "$DRY_RUN" = "true" ]; then
              # drizzle-kit doesn't ship a true dry-run; the next-best
              # thing is listing the migration files that have no matching
              # hash in drizzle.__drizzle_migrations. This is read-only.
              docker compose -p "$PROJECT" exec -T -w /app/packages/db api \
                node --input-type=module -e "
                  import { createHash } from 'node:crypto';
                  import { existsSync, readFileSync } from 'node:fs';
                  import postgres from 'postgres';

                  const migrationsFolder = '/app/packages/db/src/migrations';
                  const journalPath = migrationsFolder + '/meta/_journal.json';
                  if (!existsSync(journalPath)) {
                    console.log('No journal file in container');
                    process.exit(0);
                  }

                  const journal = JSON.parse(readFileSync(journalPath, 'utf8'));
                  const sql = postgres(process.env.DATABASE_URL, { max: 1 });
                  try {
                    let applied = [];
                    try {
                      applied = await sql.unsafe('SELECT hash, created_at FROM drizzle.__drizzle_migrations ORDER BY created_at');
                    } catch (error) {
                      if (!['42P01', '3F000'].includes(error.code)) {
                        throw error;
                      }
                    }

                    const appliedHashes = new Set(applied.map((row) => row.hash));
                    const pending = [];
                    const missingFiles = [];
                    for (const entry of journal.entries) {
                      const sqlPath = migrationsFolder + '/' + entry.tag + '.sql';
                      if (!existsSync(sqlPath)) {
                        missingFiles.push(entry.tag);
                        continue;
                      }
                      const hash = createHash('sha256').update(readFileSync(sqlPath, 'utf8')).digest('hex');
                      if (!appliedHashes.has(hash)) {
                        pending.push(entry);
                      }
                    }

                    console.log('Journal entries:', journal.entries.length);
                    console.log('Applied migrations:', applied.length);
                    console.log('Pending migrations:', pending.length);
                    if (missingFiles.length > 0) {
                      console.log('Missing migration files:', missingFiles.join(', '));
                    }
                    pending.slice(-20).forEach((entry) => {
                      console.log(' -', entry.tag, '(', new Date(entry.when).toISOString(), ')');
                    });
                    console.log('To apply: rerun this workflow with dry_run=false');
                  } finally {
                    await sql.end();
                  }
                " </dev/null
            else
              # drizzle-kit is a devDep — not in the production image.
              # Use drizzle-orm/postgres-js/migrator (prod dep) directly.
              # `cd /app/apps/api` so Node's resolver finds the api
              # package's node_modules (where drizzle-orm/postgres are
              # hoisted). Without the cd, `node -e` runs from /app
              # with no package boundary and `drizzle-orm` resolves to
              # MODULE_NOT_FOUND.
              docker compose -p "$PROJECT" exec -T -w /app/packages/db api \
                node --input-type=module -e "
                  import { migrate } from 'drizzle-orm/postgres-js/migrator';
                  import { drizzle } from 'drizzle-orm/postgres-js';
                  import postgres from 'postgres';
                  const sql = postgres(process.env.DATABASE_URL, { max: 1 });
                  const db = drizzle(sql);
                  console.log('Applying migrations from /app/packages/db/src/migrations …');
                  await migrate(db, { migrationsFolder: '/app/packages/db/src/migrations' });
                  console.log('Migrations applied OK');
                  await sql.end();
                " </dev/null
            fi

            echo "==> Post-migration journal head:"
            docker compose -p "$PROJECT" exec -T postgres \
              psql -U "${POSTGRES_USER:-haa}" "${POSTGRES_DB:-haastores}" \
              -c "SELECT hash, created_at FROM drizzle.__drizzle_migrations ORDER BY created_at DESC LIMIT 5" \
              </dev/null 2>/dev/null || echo "  (still no drizzle.__drizzle_migrations table)"

            echo "==> Confirm admin TOTP columns:"
            docker compose -p "$PROJECT" exec -T postgres \
              psql -U "${POSTGRES_USER:-haa}" "${POSTGRES_DB:-haastores}" \
              -c "SELECT column_name FROM information_schema.columns WHERE table_schema = 'public' AND table_name = 'users' AND column_name LIKE 'admin_totp_%' ORDER BY column_name" \
              </dev/null

            echo "==> Confirm whatsapp tables exist:"
            docker compose -p "$PROJECT" exec -T postgres \
              psql -U "${POSTGRES_USER:-haa}" "${POSTGRES_DB:-haastores}" \
              -c "\\dt whatsapp_*" </dev/null
          MIGRATE

      - name: Restart api so it picks up any schema-aware caches
        if: ${{ !inputs.dry_run }}
        run: |
          ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "PROJECT='$PROJECT_NAME' bash -s" <<'RESTART'
            set -euo pipefail
            cd "/srv/haa-stores"
            echo "==> Restarting api container"
            docker compose -p "$PROJECT" restart api
            sleep 5
            echo "==> Post-restart health:"
            docker compose -p "$PROJECT" exec -T api wget -qO- http://localhost:3001/health || true
          RESTART
