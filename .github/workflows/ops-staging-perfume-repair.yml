name: Ops — Staging Perfume Membership Repair

# Owner-triggered, guarded repair for the B2 seed-data isolation bug
# (workflow_dispatch only). Default mode is `plan` (read-only). `apply`
# removes the single mis-mapped tenant_users row that ties
# `merchant.perfumes@example.com` to the `haa-demo` store, and gives that
# merchant a minimal home store (`demo-perfumes`) so it is not left orphaned.
#
# The full demo catalogue seed runs through a dev-only loader that is not
# present in the deployed runtime image, so this workflow uses a SELF-CONTAINED
# minimal path built on the `postgres` package already shipped in the api
# container — no extra tooling, no image change, no deploy.
#
# Safety
# ------
#   - Manual trigger only; never auto-runs.
#   - STAGING only — no environment chooser, no live tier here.
#   - Default mode `plan` is read-only and writes nothing.
#   - `apply` proceeds ONLY when every guard holds:
#       * confirm phrase matches exactly
#       * haa-demo store exists and is_demo = true
#       * merchant.perfumes exists
#       * the wrong-membership row count is EXACTLY 1
#       * a demo-perfumes store, if it already exists, is itself a demo store
#   - Snapshots the affected tables before writing.
#   - The whole change runs in ONE transaction; any failed check rolls back.
#   - Never prints the connection string or any secret.

"on":
  workflow_dispatch:
    inputs:
      mode:
        description: "plan or apply"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
      confirm:
        description: "Required only for apply. Type: REPAIR_STAGING_PERFUME_MEMBERSHIP"
        required: false

permissions:
  contents: read

jobs:
  repair:
    name: Perfume membership repair (staging)
    runs-on: ubuntu-latest
    environment:
      name: staging
    env:
      DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
      DEPLOY_USER: ${{ secrets.STAGING_USER }}
      SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
      PROJECT_NAME: haa-staging
      MODE: ${{ inputs.mode }}
      CONFIRM: ${{ inputs.confirm }}
      GH_RUN_ID: ${{ github.run_id }}

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.SSH_KEY }}

      - name: Add server to known hosts (pre-baked, no probing)
        env:
          STAGING_KNOWN_HOSTS: ${{ secrets.STAGING_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "${STAGING_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$STAGING_KNOWN_HOSTS" >> ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts
          else
            ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
            echo "::warning::STAGING_KNOWN_HOSTS not set — used ssh-keyscan fallback."
          fi

      - name: Guarded perfume membership repair (staging)
        run: |
          set -euo pipefail

          # Runner-side gate: apply requires the exact confirm phrase.
          if [ "$MODE" = "apply" ] && [ "$CONFIRM" != "REPAIR_STAGING_PERFUME_MEMBERSHIP" ]; then
            echo "::error::apply mode requires confirm=REPAIR_STAGING_PERFUME_MEMBERSHIP (got a different value). Refusing."
            exit 1
          fi

          ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "PROJECT='$PROJECT_NAME' MODE='$MODE' GH_RUN_ID='$GH_RUN_ID' bash -s" <<'EOSSH'
            set -euo pipefail
            cd "/srv/haa-stores"

            # `docker compose exec -T` inherits stdin from this heredoc, so every
            # exec MUST close stdin with `</dev/null`. The container already holds
            # the staging connection string in its own environment; it is read
            # there and never echoed.

            echo "==> [1/4] Plan + guards (read-only)"
            docker compose -p "$PROJECT" exec -T -e RUN_MODE="$MODE" -w /app/packages/db api \
              node --input-type=module -e '
                import postgres from "postgres";
                const sql = postgres(process.env.DATABASE_URL, { max: 1 });
                const MODE = process.env.RUN_MODE || "plan";
                const PERFUME = "merchant.perfumes@example.com";
                try {
                  await sql.begin(async (tx) => {
                    await tx.unsafe("SET TRANSACTION READ ONLY");
                    const store = await tx.unsafe("SELECT id, is_demo, tenant_id FROM stores WHERE slug = $1 LIMIT 1", ["haa-demo"]);
                    if (!store.length || store[0].is_demo !== true) {
                      throw new Error("GUARD: haa-demo demo store not found / not a demo DB — not the staging seed.");
                    }
                    const haaId = store[0].id;
                    const user = await tx.unsafe("SELECT id FROM users WHERE email = $1 LIMIT 1", [PERFUME]);
                    console.log("  merchant.perfumes present:", user.length ? "yes" : "no");
                    if (!user.length) { console.log("  Nothing to repair."); return; }
                    const uid = user[0].id;
                    const wrong = await tx.unsafe("SELECT id FROM tenant_users WHERE user_id = $1 AND store_id = $2", [uid, haaId]);
                    const ps = await tx.unsafe("SELECT id, is_demo FROM stores WHERE slug = $1 LIMIT 1", ["demo-perfumes"]);
                    const psid = ps.length ? ps[0].id : null;
                    const settings = psid ? await tx.unsafe("SELECT id FROM store_settings WHERE store_id = $1 LIMIT 1", [psid]) : [];
                    const role = psid ? await tx.unsafe("SELECT id FROM roles WHERE store_id = $1 AND name = $2 LIMIT 1", [psid, "admin"]) : [];
                    const usr = psid ? await tx.unsafe("SELECT id FROM user_store_roles WHERE user_id = $1 AND store_id = $2 LIMIT 1", [uid, psid]) : [];
                    const mem = psid ? await tx.unsafe("SELECT id FROM tenant_users WHERE user_id = $1 AND store_id = $2 LIMIT 1", [uid, psid]) : [];
                    const others = await tx.unsafe("SELECT DISTINCT u.email AS email FROM tenant_users tu JOIN users u ON u.id = tu.user_id WHERE tu.store_id = $1 AND u.id <> $2", [haaId, uid]);
                    console.log("  wrong rows in haa-demo:", wrong.length);
                    console.log("  demo-perfumes store:", ps.length ? "exists" : "MISSING");
                    if (ps.length && ps[0].is_demo !== true) console.log("  WARNING: a non-demo store already owns slug demo-perfumes (apply will refuse).");
                    console.log("  other merchants on haa-demo (left untouched):", others.map((r) => r.email).join(", ") || "none");
                    console.log("  apply would create -> store:", ps.length ? "no" : "yes",
                                "| storeSettings:", (psid && settings.length) ? "no" : "yes",
                                "| userStoreRole:", (psid && usr.length) ? "no" : "yes",
                                "| tenantUser membership:", (psid && mem.length) ? "no" : "yes");
                    if (MODE === "apply" && wrong.length !== 1) {
                      throw new Error("GUARD: expected EXACTLY 1 wrong row, found " + wrong.length + " — refusing to write.");
                    }
                  });
                } catch (e) {
                  console.error("  plan/guard failed:", e.message);
                  process.exitCode = 1;
                } finally {
                  await sql.end();
                }
              ' </dev/null

            if [ "$MODE" != "apply" ]; then
              echo "==> PLAN ONLY — no changes were made."
              exit 0
            fi

            echo "==> [2/4] Snapshot affected tables before writing"
            docker compose -p "$PROJECT" exec -T -e RUN_ID="$GH_RUN_ID" -w /app/packages/db api \
              node --input-type=module -e '
                import postgres from "postgres";
                const sql = postgres(process.env.DATABASE_URL, { max: 1 });
                const rid = process.env.RUN_ID || "";
                const TABLES = ["tenant_users", "stores", "store_settings", "user_store_roles", "roles"];
                try {
                  if (!/^[0-9]+$/.test(rid)) throw new Error("bad run id for backup name");
                  for (const t of TABLES) {
                    const name = t + "_bak_" + rid;
                    await sql.unsafe("CREATE TABLE IF NOT EXISTS " + name + " AS SELECT * FROM " + t);
                    const n = await sql.unsafe("SELECT count(*)::int AS c FROM " + name);
                    console.log("  backup " + name + " rows: " + n[0].c);
                  }
                } catch (e) { console.error("  snapshot failed:", e.message); process.exitCode = 1; }
                finally { await sql.end(); }
              ' </dev/null

            echo "==> [3/4] Apply minimal repair in ONE transaction (create home store + correct membership, remove wrong row)"
            docker compose -p "$PROJECT" exec -T -w /app/packages/db api \
              node --input-type=module -e '
                import postgres from "postgres";
                const sql = postgres(process.env.DATABASE_URL, { max: 1 });
                const PERFUME = "merchant.perfumes@example.com";
                const STORE_NAME = "عطور هاء (متجر تجريبي)";
                try {
                  await sql.begin(async (tx) => {
                    const store = await tx.unsafe("SELECT id, is_demo, tenant_id FROM stores WHERE slug = $1 LIMIT 1", ["haa-demo"]);
                    if (!store.length || store[0].is_demo !== true) throw new Error("GUARD: not the staging demo DB.");
                    const haaId = store[0].id;
                    const tid = store[0].tenant_id;
                    const user = await tx.unsafe("SELECT id FROM users WHERE email = $1 LIMIT 1", [PERFUME]);
                    if (!user.length) throw new Error("GUARD: perfume user not found.");
                    const uid = user[0].id;
                    const wrong = await tx.unsafe("SELECT id FROM tenant_users WHERE user_id = $1 AND store_id = $2", [uid, haaId]);
                    if (wrong.length !== 1) throw new Error("GUARD: expected EXACTLY 1 wrong row, found " + wrong.length);

                    // Home store (create if missing; never reuse a non-demo store on this slug).
                    let ps = await tx.unsafe("SELECT id, is_demo FROM stores WHERE slug = $1 LIMIT 1", ["demo-perfumes"]);
                    let psid;
                    if (ps.length) {
                      if (ps[0].is_demo !== true) throw new Error("GUARD: slug demo-perfumes is owned by a NON-demo store — refusing.");
                      psid = ps[0].id;
                    } else {
                      const created = await tx.unsafe(
                        "INSERT INTO stores (tenant_id, name, slug, is_demo, demo_profile, status, is_active, publish_status) VALUES ($1, $2, $3, true, $4, $5, true, $6) RETURNING id",
                        [tid, STORE_NAME, "demo-perfumes", "perfume", "active", "published"]);
                      psid = created[0].id;
                    }

                    const hasSettings = await tx.unsafe("SELECT id FROM store_settings WHERE store_id = $1 LIMIT 1", [psid]);
                    if (!hasSettings.length) await tx.unsafe("INSERT INTO store_settings (store_id) VALUES ($1)", [psid]);

                    let role = await tx.unsafe("SELECT id FROM roles WHERE store_id = $1 AND name = $2 LIMIT 1", [psid, "admin"]);
                    let rid;
                    if (role.length) { rid = role[0].id; }
                    else { const r = await tx.unsafe("INSERT INTO roles (store_id, name) VALUES ($1, $2) RETURNING id", [psid, "admin"]); rid = r[0].id; }

                    const hasUsr = await tx.unsafe("SELECT id FROM user_store_roles WHERE user_id = $1 AND store_id = $2 LIMIT 1", [uid, psid]);
                    if (!hasUsr.length) await tx.unsafe("INSERT INTO user_store_roles (user_id, store_id, role_id) VALUES ($1, $2, $3)", [uid, psid, rid]);

                    const hasMem = await tx.unsafe("SELECT id FROM tenant_users WHERE user_id = $1 AND store_id = $2 LIMIT 1", [uid, psid]);
                    if (!hasMem.length) await tx.unsafe("INSERT INTO tenant_users (tenant_id, store_id, user_id, role) VALUES ($1, $2, $3, $4)", [tid, psid, uid, "owner"]);

                    const gone = await tx.unsafe("DELETE FROM tenant_users WHERE user_id = $1 AND store_id = $2 RETURNING id", [uid, haaId]);
                    if (gone.length !== 1) throw new Error("ABORT: removed " + gone.length + " rows, expected 1 — rolled back.");

                    console.log("  demo-perfumes store id:", psid, "| removed wrong rows:", gone.length);
                  });
                } catch (e) { console.error("  apply failed (rolled back):", e.message); process.exitCode = 1; }
                finally { await sql.end(); }
              ' </dev/null

            echo "==> [4/4] Re-verify (read-only)"
            docker compose -p "$PROJECT" exec -T -w /app/packages/db api \
              node --input-type=module -e '
                import postgres from "postgres";
                const sql = postgres(process.env.DATABASE_URL, { max: 1 });
                const PERFUME = "merchant.perfumes@example.com";
                const HAA = "merchant.haa-demo@example.com";
                try {
                  await sql.begin(async (tx) => {
                    await tx.unsafe("SET TRANSACTION READ ONLY");
                    const haa = await tx.unsafe("SELECT id FROM stores WHERE slug = $1 LIMIT 1", ["haa-demo"]);
                    const u = await tx.unsafe("SELECT id FROM users WHERE email = $1 LIMIT 1", [PERFUME]);
                    const wrong = await tx.unsafe("SELECT count(*)::int AS c FROM tenant_users WHERE user_id = $1 AND store_id = $2", [u[0].id, haa[0].id]);
                    const rows = await tx.unsafe("SELECT s.slug AS store, tu.role FROM tenant_users tu JOIN users uu ON uu.id = tu.user_id JOIN stores s ON s.id = tu.store_id WHERE uu.email = $1 ORDER BY s.slug", [PERFUME]);
                    const haaMember = await tx.unsafe("SELECT count(*)::int AS c FROM tenant_users tu JOIN users uu ON uu.id = tu.user_id WHERE uu.email = $1 AND tu.store_id = $2", [HAA, haa[0].id]);
                    console.log("  wrong rows in haa-demo now:", wrong[0].c, "(want 0)");
                    console.log("  perfume memberships now:", rows.map((r) => r.store + "(" + r.role + ")").join(", ") || "none");
                    console.log("  merchant.haa-demo still on haa-demo:", haaMember[0].c === 1 ? "yes (untouched)" : "CHANGED — investigate");
                  });
                } catch (e) { console.error("  verify failed:", e.message); process.exitCode = 1; }
                finally { await sql.end(); }
              ' </dev/null
          EOSSH
