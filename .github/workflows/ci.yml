name: CI

on:
  push:
    branches: [main, quality-pass-*]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Reusable setup anchor ───────────────────────────────────────────────────
# Every job uses the same three-step bootstrap sequence:
#   1. pnpm/action-setup  (must come BEFORE setup-node so cache: pnpm resolves)
#   2. actions/setup-node (handles pnpm store caching internally via cache-dependency-path)
#   3. pnpm install --frozen-lockfile
#
# We deliberately avoid the manual
#   "Get pnpm store directory → actions/cache@v5 path: ${{ steps.xxx.outputs.STORE_PATH }}"
# pattern because STORE_PATH can be empty when pnpm is not yet on PATH, causing
# "Error: Input required and not supplied: path" in actions/cache@v5.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 0. Secret scan (G4) ─────────────────────────────────────────────────
  # Runs independently and in parallel with preflight. No pnpm required.
  # Blocks the PR if any secret/credential pattern is detected in the diff.
  secret-scan:
    name: Secret Scan (G4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 1. Preflight ─────────────────────────────────────────────────────────
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify environment
        run: |
          node -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify workspace packages
        run: pnpm -r list --depth -1

      - name: Preflight checks
        run: pnpm preflight

      - name: Env contract check (G1)
        run: node scripts/check-env-contract.mjs

      - name: Migration journal completeness (G5)
        run: node scripts/check-migration-journal.mjs

      - name: Assert api Dockerfile overlays compiled packages (G2)
        run: |
          # INC-05: the api prod stage must overlay the compiled workspace
          # packages (dist/) from the build stage, otherwise the image boots
          # with ERR_MODULE_NOT_FOUND for every @haa/* package.
          # This grep prevents silent regression of that COPY line.
          if ! grep -q 'COPY --from=build /repo/packages ./packages' apps/api/Dockerfile; then
            echo "::error file=apps/api/Dockerfile::Missing compiled-packages overlay."
            echo "The prod stage must contain:"
            echo "  COPY --from=build /repo/packages ./packages"
            echo "Without it the api image crashes with ERR_MODULE_NOT_FOUND on boot."
            exit 1
          fi
          echo "✓ api Dockerfile has compiled-packages overlay"

  # ── 2. Typecheck ─────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages (required for cross-package type resolution)
        run: pnpm -r --filter './packages/**' --workspace-concurrency=1 build

      - name: Typecheck
        run: pnpm typecheck

  # ── 3. Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  # ── 4. Unit / Integration Tests ──────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: preflight
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: haa
          POSTGRES_PASSWORD: haa_test_pw
          POSTGRES_DB: haa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://haa:haa_test_pw@localhost:5432/haa_test
      TEST_DATABASE_URL: postgresql://haa:haa_test_pw@localhost:5432/haa_test
      JWT_SECRET: ci-jwt-secret-at-least-16-chars
      ADMIN_JWT_SECRET: ci-admin-jwt-secret-at-least-16-chars
      ENCRYPTION_KEY: ci-encryption-key-32-chars-minimum-!!
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for Postgres (G3)
        run: |
          echo "Asserting Postgres is accepting connections on :5432..."
          for i in $(seq 1 20); do
            pg_isready -h localhost -p 5432 -U haa && break
            echo "  Attempt $i/20 — retrying in 2s..."
            sleep 2
          done
          pg_isready -h localhost -p 5432 -U haa \
            || { echo "::error::Postgres did not become ready within 40s"; exit 1; }

      - name: Prepare test database
        run: |
          pnpm db:bootstrap
          pnpm db:seed

      - name: Test
        run: pnpm test

  # ── 5. Build Matrix ──────────────────────────────────────────────────────
  # Each app name matches its package.json "name" field: @haa/<app>
  # Verified names: @haa/api, @haa/merchant-dashboard, @haa/admin-dashboard, @haa/storefront
  build:
    name: Build — ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    strategy:
      fail-fast: false
      matrix:
        app: [api, merchant-dashboard, admin-dashboard, storefront]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm -r --filter './packages/**' --workspace-concurrency=1 build

      - name: Build @haa/${{ matrix.app }}
        run: pnpm --filter @haa/${{ matrix.app }} build

      # P2-027 audit fix: measure gzipped bundle size so we have a
      # concrete number to compare against perf budgets (P2-028).
      # The merchant-dashboard target is 350KB gzipped; storefront
      # target is 250KB gzipped. We currently warn-only — flipping
      # to a hard fail comes after the size has been reduced under
      # those budgets (P2-028 follow-up).
      - name: Bundle size — gzipped report
        if: ${{ matrix.app != 'api' }}
        run: |
          set -euo pipefail
          # Vite emits `dist/` at the app root. For api the build is
          # a tsc compile, not a bundled artefact — skip.
          DIST="apps/${{ matrix.app }}/dist"
          if [ ! -d "$DIST" ]; then
            echo "::warning::no dist/ at $DIST — skipping bundle size report"
            exit 0
          fi
          echo "## Bundle size — ${{ matrix.app }} (gzipped)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | uncompressed | gzipped |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---:|---:|" >> "$GITHUB_STEP_SUMMARY"
          total_raw=0
          total_gz=0
          # Only main JS + CSS chunks; ignore images / fonts / sourcemaps.
          while IFS= read -r f; do
            raw=$(wc -c < "$f")
            gz=$(gzip -9 -c "$f" | wc -c)
            total_raw=$(( total_raw + raw ))
            total_gz=$(( total_gz + gz ))
            base="${f#$DIST/}"
            printf "| %s | %s | %s |\n" "$base" "$(numfmt --to=iec --suffix=B $raw)" "$(numfmt --to=iec --suffix=B $gz)" >> "$GITHUB_STEP_SUMMARY"
          done < <(find "$DIST" -type f \( -name "*.js" -o -name "*.css" \) -not -name "*.map" | sort)
          printf "| **TOTAL** | **%s** | **%s** |\n" \
            "$(numfmt --to=iec --suffix=B $total_raw)" \
            "$(numfmt --to=iec --suffix=B $total_gz)" >> "$GITHUB_STEP_SUMMARY"

          # Print a one-line summary to the job log too.
          echo "::notice::Bundle ${{ matrix.app }}: raw=$(numfmt --to=iec --suffix=B $total_raw) gzipped=$(numfmt --to=iec --suffix=B $total_gz)"

          # P2-028 placeholder budget — warn-only for now.
          case "${{ matrix.app }}" in
            merchant-dashboard) BUDGET=$(( 350 * 1024 )) ;;
            admin-dashboard)    BUDGET=$(( 350 * 1024 )) ;;
            storefront)         BUDGET=$(( 250 * 1024 )) ;;
            *)                  BUDGET=0 ;;
          esac
          if [ "$BUDGET" -gt 0 ] && [ "$total_gz" -gt "$BUDGET" ]; then
            echo "::warning::Bundle ${{ matrix.app }} is $(numfmt --to=iec --suffix=B $total_gz) gzipped, over the $(numfmt --to=iec --suffix=B $BUDGET) budget. P2-028 tracks tightening this to a hard fail."
          fi

  # ── 6. E2E Tests ─────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: haa
          POSTGRES_PASSWORD: haa_test_pw
          POSTGRES_DB: haa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://haa:haa_test_pw@localhost:5432/haa_test
      TEST_DATABASE_URL: postgresql://haa:haa_test_pw@localhost:5432/haa_test
      JWT_SECRET: ci-jwt-secret-at-least-16-chars
      ADMIN_JWT_SECRET: ci-admin-jwt-secret-at-least-16-chars
      ENCRYPTION_KEY: ci-encryption-key-32-chars-minimum-!!
      API_PORT: "3000"
      PAYMENT_MODE: fake
      SHIPPING_MODE: manual
      STORAGE_DRIVER: local
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build shared packages
        run: pnpm -r --filter './packages/**' --workspace-concurrency=1 build

      - name: Wait for Postgres (G3)
        run: |
          echo "Asserting Postgres is accepting connections on :5432..."
          for i in $(seq 1 20); do
            pg_isready -h localhost -p 5432 -U haa && break
            echo "  Attempt $i/20 — retrying in 2s..."
            sleep 2
          done
          pg_isready -h localhost -p 5432 -U haa \
            || { echo "::error::Postgres did not become ready within 40s"; exit 1; }

      - name: Run DB migrations
        run: pnpm db:bootstrap

      - name: Seed test DB
        run: pnpm db:seed

      # API uses tsx watch (dev mode) — no build step required.
      # Port 3000 is set via API_PORT env above.
      - name: Start API (dev mode)
        run: pnpm --filter @haa/api dev &

      # Storefront uses Vite dev server on port 5174 (configured in vite.config.ts).
      - name: Start storefront (dev mode)
        run: pnpm --filter @haa/storefront dev &

      - name: Start merchant dashboard (dev mode)
        run: pnpm --filter @haa/merchant-dashboard dev &

      - name: Start admin dashboard (dev mode)
        run: pnpm --filter @haa/admin-dashboard dev &

      - name: Wait for servers to be ready
        run: |
          echo "Waiting for API on :3000..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/health && break
            sleep 2
          done
          curl -sf http://localhost:3000/health || { echo "ERROR: API did not start within 60s"; exit 1; }

          echo "Waiting for storefront on :5174..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:5174 && break
            sleep 2
          done
          curl -sf http://localhost:5174 || { echo "ERROR: Storefront did not start within 60s"; exit 1; }

          echo "Waiting for merchant dashboard on :5173..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 && break
            sleep 2
          done
          curl -sf http://localhost:5173 || { echo "ERROR: Merchant dashboard did not start within 60s"; exit 1; }

          echo "Waiting for admin dashboard on :5175..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:5175 && break
            sleep 2
          done
          curl -sf http://localhost:5175 || { echo "ERROR: Admin dashboard did not start within 60s"; exit 1; }

      - name: Run E2E tests
        run: pnpm exec playwright test --project=chromium

      - name: Upload E2E report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-report
          path: tests/e2e/report/
          retention-days: 7
