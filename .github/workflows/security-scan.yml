name: Security Scan

on:
  schedule:
    # كل يوم الأحد الساعة 2 صباحاً UTC
    - cron: "0 2 * * 0"
  # تشغيل يدوي عند الحاجة
  workflow_dispatch:
  # فحص عند أي تغيير في الـ dependencies
  push:
    branches: [main]
    paths:
      - "**/package.json"
      - "pnpm-lock.yaml"

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. pnpm audit — فحص الـ vulnerabilities
  # ─────────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (production)
        id: audit
        run: |
          pnpm audit --prod --json > audit-report.json 2>&1 || true
          # فحص النتيجة — فشل إذا كانت هناك vulnerabilities حرجة أو عالية
          HIGH=$(cat audit-report.json | node -e "
            const data = require('fs').readFileSync('/dev/stdin', 'utf8');
            try {
              const report = JSON.parse(data);
              const meta = report.metadata?.vulnerabilities || {};
              console.log((meta.high || 0) + (meta.critical || 0));
            } catch(e) { console.log('0'); }
          ")
          echo "high_critical_count=$HIGH" >> "$GITHUB_OUTPUT"

          # طباعة ملخص
          echo "==> Audit Summary:"
          cat audit-report.json | node -e "
            const data = require('fs').readFileSync('/dev/stdin', 'utf8');
            try {
              const report = JSON.parse(data);
              const v = report.metadata?.vulnerabilities || {};
              console.log('Critical:', v.critical || 0);
              console.log('High:    ', v.high || 0);
              console.log('Medium:  ', v.moderate || 0);
              console.log('Low:     ', v.low || 0);
            } catch(e) { console.log('Could not parse audit output'); }
          "

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-audit-report-${{ github.run_number }}
          path: audit-report.json
          retention-days: 30

      - name: Fail on high/critical vulnerabilities
        if: steps.audit.outputs.high_critical_count > 0
        run: |
          echo "::error::Found ${{ steps.audit.outputs.high_critical_count }} high/critical vulnerabilities!"
          echo "Run 'pnpm audit --prod' locally and update the affected packages."
          exit 1

  # ─────────────────────────────────────────────────────────────
  # 2. License Check — فحص التراخيص غير المرخصة
  # ─────────────────────────────────────────────────────────────
  license-check:
    name: License Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for forbidden licenses
        run: |
          npx license-checker --production --failOn 'GPL;LGPL;AGPL;SSPL' \
            --excludePackages '' \
            --json > licenses.json 2>&1 || {
            echo "::warning::License check found potentially incompatible licenses."
            cat licenses.json
          }

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report-${{ github.run_number }}
          path: licenses.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # 3. Secrets Scanning — بحث عن أسرار مرفوعة بالخطأ
  # ─────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─────────────────────────────────────────────────────────────
  # 4. Outdated Dependencies Report
  # ─────────────────────────────────────────────────────────────
  outdated-check:
    name: Outdated Dependencies
    runs-on: ubuntu-latest
    # هذا Job تحذيري فقط — لا يوقف الـ pipeline
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check outdated packages
        run: |
          echo "==> Outdated packages report:"
          pnpm outdated --recursive 2>/dev/null || true

      - name: Check for packages with known major updates
        run: |
          pnpm outdated --recursive --format=json 2>/dev/null > outdated.json || echo '{}' > outdated.json
          MAJOR_COUNT=$(node -e "
            try {
              const data = JSON.parse(require('fs').readFileSync('outdated.json'));
              let count = 0;
              for (const [pkg, info] of Object.entries(data)) {
                const current = (info.current || '0').split('.')[0];
                const latest = (info.latest || '0').split('.')[0];
                if (parseInt(latest) > parseInt(current)) count++;
              }
              console.log(count);
            } catch(e) { console.log(0); }
          ")
          echo "::notice::$MAJOR_COUNT packages have major version updates available"

      - name: Upload outdated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outdated-packages-${{ github.run_number }}
          path: outdated.json
          retention-days: 30
