name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [staging, production]
        default: staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/haa-stores

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Build & Push Docker images to GHCR
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push — ${{ matrix.app }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [api, merchant-dashboard, admin-dashboard, storefront]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            APP_VERSION=${{ github.run_number }}
            VITE_API_URL=/api

  # ─────────────────────────────────────────────────────────────
  # 2. Deploy to Staging (تلقائي عند كل push لـ main)
  # ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    env:
      IMAGE_TAG: sha-${{ github.sha }}

    steps:
      - name: Preflight — verify required staging config
        env:
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
          STAGING_URL: ${{ vars.STAGING_URL }}
          STAGING_HEALTH_URL: ${{ vars.STAGING_HEALTH_URL }}
        run: |
          missing=()
          for v in STAGING_SSH_KEY STAGING_HOST STAGING_USER STAGING_DEPLOY_PATH STAGING_URL STAGING_HEALTH_URL; do
            if [ -z "${!v}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required staging config: ${missing[*]}"
            echo "Set them under Settings → Environments → staging — secrets:"
            echo "  STAGING_SSH_KEY, STAGING_HOST, STAGING_USER, STAGING_DEPLOY_PATH"
            echo "and variables: STAGING_URL, STAGING_HEALTH_URL."
            exit 1
          fi
          echo "✓ All required staging secrets and variables are present."

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Authenticate staging server to GHCR
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
        run: |
          # Pipe the run-scoped GITHUB_TOKEN over stdin (never in argv) so the
          # server can pull the private app images. Persists in the server's
          # docker config for this and subsequent `docker compose pull` calls.
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | ssh "$DEPLOY_USER@$DEPLOY_HOST" \
                "docker login ghcr.io -u ${{ github.actor }} --password-stdin"

      - name: Deploy to staging server
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
          GIT_SHA: ${{ github.sha }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          ssh $DEPLOY_USER@$DEPLOY_HOST << EOF
            set -euo pipefail
            cd $DEPLOY_PATH

            echo "==> Pulling new images (sha: ${GIT_SHA:0:7})"
            export IMAGE_TAG=sha-${GIT_SHA:0:7}
            export REGISTRY=$REGISTRY
            export IMAGE_PREFIX=$IMAGE_PREFIX

            docker compose pull

            echo "==> Bringing up new containers"
            docker compose up -d --remove-orphans

            echo "==> Cleaning up old images"
            docker image prune -f --filter "until=24h"

            echo "==> Deploy complete"
          EOF

      - name: Post-deploy smoke gate — staging (G9)
        id: health-check
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
        run: |
          echo "Waiting for services to stabilize..."
          sleep 15

          # Phase 1: wait for /health to respond (api process + DB + Redis)
          MAX_RETRIES=10
          RETRY_INTERVAL=10
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/health" || echo "000")
            echo "Attempt $i/$MAX_RETRIES — /health HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              break
            fi
            if [ "$i" = "$MAX_RETRIES" ]; then
              echo "health=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            sleep $RETRY_INTERVAL
          done

          # Phase 2: run the full smoke suite (G9 — INC-21)
          # Checks: /health JSON, storefront HTML, /api payment-methods contract
          bash scripts/server/smoke-staging.sh "$STAGING_URL"
          echo "health=ok" >> "$GITHUB_OUTPUT"

      - name: Rollback staging on health failure
        if: failure() && steps.health-check.outputs.health == 'failed'
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
        run: |
          echo "::error::Health check failed — initiating rollback"
          ssh $DEPLOY_USER@$DEPLOY_HOST << EOF
            set -euo pipefail
            cd $DEPLOY_PATH

            echo "==> Rolling back to previous images"
            # إرجاع الـ containers للـ tag السابق (latest يشير للإصدار السابق قبل الـ pull)
            docker compose down
            docker compose up -d --no-pull

            echo "==> Rollback complete"
          EOF

  # ─────────────────────────────────────────────────────────────
  # 3. Deploy to Production (يدوي فقط + environment protection)
  # ─────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'production'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    env:
      IMAGE_TAG: sha-${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to production server
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_USER }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
          GIT_SHA: ${{ github.sha }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          ssh $DEPLOY_USER@$DEPLOY_HOST << EOF
            set -euo pipefail
            cd $DEPLOY_PATH

            echo "==> [PRODUCTION] Pulling new images (sha: ${GIT_SHA:0:7})"
            export IMAGE_TAG=sha-${GIT_SHA:0:7}
            export REGISTRY=$REGISTRY
            export IMAGE_PREFIX=$IMAGE_PREFIX

            # نسخ احتياطي من الـ compose state الحالي قبل النشر
            cp docker-compose.yml docker-compose.yml.bak 2>/dev/null || true

            docker compose pull

            echo "==> Rolling update — zero-downtime"
            docker compose up -d --remove-orphans

            echo "==> Cleaning up old images (keep last 3)"
            docker image prune -f --filter "until=72h"

            echo "==> [PRODUCTION] Deploy complete"
          EOF

      - name: Health check — production
        id: prod-health-check
        env:
          HEALTH_URL: ${{ vars.PRODUCTION_HEALTH_URL }}
        run: |
          echo "Waiting for services to stabilize..."
          sleep 20

          MAX_RETRIES=15
          RETRY_INTERVAL=15
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL/health" || echo "000")
            echo "Attempt $i/$MAX_RETRIES — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "health=ok" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep $RETRY_INTERVAL
          done

          echo "health=failed" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Rollback production on health failure
        if: failure() && steps.prod-health-check.outputs.health == 'failed'
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_USER }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
        run: |
          echo "::error::PRODUCTION health check failed — initiating rollback"
          ssh $DEPLOY_USER@$DEPLOY_HOST << EOF
            set -euo pipefail
            cd $DEPLOY_PATH

            echo "==> [PRODUCTION] Emergency rollback"
            docker compose down
            docker compose up -d --no-pull

            echo "==> Rollback complete — please investigate immediately"
          EOF

      - name: Notify deployment result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::Production deployment successful — sha ${{ github.sha }}"
          else
            echo "::error::Production deployment FAILED — sha ${{ github.sha }}"
          fi
