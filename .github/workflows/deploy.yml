name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [staging, production]
        default: staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/haa-stores

jobs:
  # ─────────────────────────────────────────────────────────────
  # 0. Quality gates — MUST pass before any image is built/pushed.
  #    Self-contained guard so a deploy can never ship un-gated code
  #    even if it races the separate CI workflow on the same commit.
  # ─────────────────────────────────────────────────────────────
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: haa
          POSTGRES_PASSWORD: haa_test_pw
          POSTGRES_DB: haa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://haa:haa_test_pw@localhost:5432/haa_test
      TEST_DATABASE_URL: postgresql://haa:haa_test_pw@localhost:5432/haa_test
      JWT_SECRET: ci-jwt-secret-at-least-16-chars # gitleaks:allow — known-fake CI value
      ADMIN_JWT_SECRET: ci-admin-jwt-secret-at-least-16-chars # gitleaks:allow — known-fake CI value
      ENCRYPTION_KEY: ci-encryption-key-32-chars-minimum-!! # gitleaks:allow — known-fake CI value
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages (cross-package type resolution)
        run: pnpm -r --filter './packages/**' --workspace-concurrency=1 build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 20); do
            pg_isready -h localhost -p 5432 -U haa && break
            echo "  Attempt $i/20 — retrying in 2s..."
            sleep 2
          done
          pg_isready -h localhost -p 5432 -U haa \
            || { echo "::error::Postgres did not become ready within 40s"; exit 1; }

      - name: Prepare test database
        run: |
          pnpm db:bootstrap
          pnpm db:seed

      # The unit/integration suite encodes the product guards the review asked
      # for (fake-payment production gate, theme/CSS scope isolation, landing
      # add-to-cart, marketplace-checkout gate, etc.). Running it here blocks a
      # deploy on any guard regression.
      - name: Test (unit + integration guards)
        run: pnpm test

  # ─────────────────────────────────────────────────────────────
  # 1. Build & Push Docker images to GHCR (only after gates pass)
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push — ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: quality-gates
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [api, merchant-dashboard, admin-dashboard, storefront]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}
          # The immutable sha-<short> tag is the ONLY tag the compose files
          # deploy from (image: ...:${IMAGE_TAG}). `latest`/`staging` are kept
          # for human discoverability only — deploy & rollback never rely on
          # them (both pin an explicit sha-* tag).
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            APP_VERSION=${{ github.run_number }}
            VITE_API_URL=/api

  # ─────────────────────────────────────────────────────────────
  # 2. Deploy to Staging (تلقائي عند كل push لـ main)
  # ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    env:
      IMAGE_TAG: sha-${{ github.sha }}

    steps:
      - name: Preflight — verify required staging config
        env:
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
          STAGING_URL: ${{ vars.STAGING_URL }}
          STAGING_HEALTH_URL: ${{ vars.STAGING_HEALTH_URL }}
        run: |
          missing=()
          for v in STAGING_SSH_KEY STAGING_HOST STAGING_USER STAGING_DEPLOY_PATH STAGING_URL STAGING_HEALTH_URL; do
            if [ -z "${!v}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required staging config: ${missing[*]}"
            echo "Set them under Settings → Environments → staging — secrets:"
            echo "  STAGING_SSH_KEY, STAGING_HOST, STAGING_USER, STAGING_DEPLOY_PATH"
            echo "and variables: STAGING_URL, STAGING_HEALTH_URL."
            exit 1
          fi
          echo "✓ All required staging secrets and variables are present."

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known hosts
        # Replaces the previous `ssh-keyscan -H` probe. ssh-keyscan opens a
        # TCP connection to port 22 just to read the host key; staging's
        # fail2ban (sshd jail) treats repeated probes from GitHub runner IPs
        # as brute-force attempts and banhammers the source IP, which then
        # breaks every subsequent SSH step in this job.
        #
        # New behavior (in priority order):
        #   1. If STAGING_KNOWN_HOSTS secret is set → write it verbatim. Zero
        #      probing, fully authenticated, MITM-safe.
        #   2. Otherwise → configure SSH client with `StrictHostKeyChecking
        #      accept-new`. The first real SSH command (the ones that actually
        #      need to run anyway, e.g. `docker login`) adds the key on its
        #      own. No separate probe → no extra connection → no fail2ban
        #      trigger.
        env:
          STAGING_KNOWN_HOSTS: ${{ secrets.STAGING_KNOWN_HOSTS }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "${STAGING_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$STAGING_KNOWN_HOSTS" >> ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts
            echo "✓ Used pre-baked STAGING_KNOWN_HOSTS (no probing)."
          else
            cat >> ~/.ssh/config <<EOF
          Host ${STAGING_HOST}
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
            ConnectTimeout 30
            ServerAliveInterval 30
            ServerAliveCountMax 3
          EOF
            chmod 600 ~/.ssh/config
            touch ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts
            echo "⚠ STAGING_KNOWN_HOSTS secret not set — falling back to accept-new on first connect."
            echo "  This is one SSH connection (the docker login that follows) instead of two."
            echo "  To eliminate the fallback, add STAGING_KNOWN_HOSTS as a repo secret:"
            echo "    ssh-keyscan -H <staging-host> | base64  → paste decoded value as secret"
          fi

      - name: Warm up SSH (retry past residual fail2ban window)
        # The first SSH connection after a probing-heavy day can still hit
        # a residual fail2ban ban from before PR #61's ssh-keyscan removal.
        # We retry with exponential backoff (30s/60s/120s) so a deploy
        # survives a still-active ban without failing the whole job. Every
        # subsequent SSH step in this job piggybacks on the warmed-up
        # known_hosts entry that this step creates on the first success.
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if ssh -o ConnectTimeout=30 -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" "echo ssh-ok"; then
              echo "✓ SSH warmed up on attempt $attempt"
              exit 0
            fi
            wait_s=$((attempt * 30))
            echo "⚠ SSH warmup attempt $attempt failed; sleeping ${wait_s}s before retry"
            sleep "$wait_s"
          done
          echo "::error::SSH warmup failed after 3 attempts (likely residual fail2ban ban)"
          exit 1

      - name: Authenticate staging server to GHCR
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
          # Prefer a long-lived, read-only packages token; fall back to the
          # run-scoped GITHUB_TOKEN when GHCR_READ_TOKEN isn't configured.
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" \
            | ssh -o ConnectTimeout=30 "$DEPLOY_USER@$DEPLOY_HOST" \
                "docker login ghcr.io -u ${{ github.actor }} --password-stdin"

      - name: Port ownership preflight (G7)
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "PROJECT=haa-staging bash -s" << 'G7_EOF'
            set -euo pipefail
            echo "==> G7: asserting ports 80 / 443 / 5433 are free or owned by $PROJECT..."
            _failed=0
            # Ownership check uses Docker labels rather than text parsing
            # of `compose ps`. Labels are the canonical project-membership
            # marker in Compose v2; the previous grep against `compose ps`
            # text was fragile — a single-row port column line or a stopped
            # container made the regex miss `:80->` even when Caddy was
            # healthy and listening. Labels survive `docker container prune`,
            # restarts, and image upgrades, so the check stays accurate.
            for _p in 80 443 5433; do
              _busy=$(ss -Htlnp "sport = :${_p}" 2>/dev/null | head -1)
              if [ -z "$_busy" ]; then
                echo "  :${_p} — free"
              elif docker ps --filter "label=com.docker.compose.project=${PROJECT}" \
                     --format '{{.Ports}}' 2>/dev/null | grep -qE ":${_p}->"; then
                echo "  :${_p} — $PROJECT (OK)"
              else
                echo "G7 ERROR: port ${_p} is occupied by a foreign process:"
                ss -tlnp "sport = :${_p}" 2>/dev/null || true
                echo "  containers labelled $PROJECT currently listening:"
                docker ps --filter "label=com.docker.compose.project=${PROJECT}" \
                  --format '  {{.Names}}  {{.Ports}}' 2>/dev/null || true
                _failed=1
              fi
            done
            if [ "$_failed" -ne 0 ]; then
              echo "G7 preflight FAILED — identify and stop the conflicting process, then re-run deploy"
              exit 1
            fi
            echo "✓ G7: ports 80 / 443 / 5433 are clear"
          G7_EOF

      - name: Sync deploy config to staging server
        # Caddyfile + docker-compose.yml are volume-bind / config-on-host
        # in the staging compose stack, so the server keeps stale copies
        # until we explicitly scp them up. Without this step, edits to
        # deploy/staging/Caddyfile (e.g. the security_headers snippet
        # introduced in PR #60) silently never reach Caddy on staging.
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          # -o BatchMode=yes prevents an interactive prompt if the host key
          # path hits an unexpected condition; the previous step already
          # populated ~/.ssh/known_hosts (or set accept-new in ssh config).
          scp -o BatchMode=yes deploy/staging/Caddyfile "$DEPLOY_USER@$DEPLOY_HOST":"$DEPLOY_PATH/Caddyfile"
          scp -o BatchMode=yes deploy/staging/docker-compose.yml "$DEPLOY_USER@$DEPLOY_HOST":"$DEPLOY_PATH/docker-compose.yml"
          echo "✓ Synced Caddyfile + docker-compose.yml to $DEPLOY_PATH"

      - name: Deploy to staging server
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
          GIT_SHA: ${{ github.sha }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          # Runner-side values are injected into the REMOTE shell's environment
          # via the ssh command prefix; the quoted heredoc body then runs on the
          # server using those vars. This records the previous tag for a
          # deterministic rollback (never relies on `latest`).
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' NEW_TAG='sha-${GIT_SHA:0:7}' REGISTRY='$REGISTRY' IMAGE_PREFIX='$IMAGE_PREFIX' bash -s" << 'REMOTE'
            set -euo pipefail
            cd "$DEPLOY_PATH"

            # Capture the currently-deployed tag so rollback can restore it.
            PREV_TAG="$(grep -E '^IMAGE_TAG=' .env 2>/dev/null | cut -d= -f2- || true)"
            printf '%s\n' "${PREV_TAG:-}" > .deploy-prev-tag
            echo "==> Previous tag: ${PREV_TAG:-<none>} | New tag: $NEW_TAG"

            # ── Disk preflight + safe cleanup (BEFORE pull) ───────────
            # Deploy #98 failed mid-`docker compose pull` with
            # "no space left on device" while extracting a Next.js layer.
            # Root cause: 198 images had accumulated; the old post-deploy
            # filter `--until=24h` doesn't catch them because rapid
            # back-to-back deploys keep "touching" images.
            #
            # This block cleans BEFORE the pull so headroom is guaranteed.
            # Forbidden: `docker volume prune` and any `--volumes` flag —
            # postgres + minio data live in named volumes and would be
            # destroyed. Containers, images, build cache, and networks
            # are safe to prune (the running containers protect their
            # in-use images from `image prune -af`).
            echo "==> Disk state BEFORE cleanup"
            df -h / | awk 'NR==1 || $0 ~ "/$" {print}'
            docker system df 2>&1 || true

            echo "==> Safe cleanup (containers, images, build cache, networks — volumes preserved)"
            docker container prune -f 2>&1 | tail -1
            docker image prune -af 2>&1 | tail -1
            docker builder prune -af 2>&1 | tail -1
            docker network prune -f 2>&1 | tail -1

            echo "==> Disk state AFTER cleanup"
            df -h / | awk 'NR==1 || $0 ~ "/$" {print}'
            docker system df 2>&1 || true

            # Hard floor: refuse to pull if less than 8 GB free on /.
            # The heaviest single image is the merchant-dashboard build
            # (~1.5 GB compressed, ~3 GB extracted); pulling 4 SPA + API
            # + Caddy + redis + postgres + minio images plus the
            # extraction working set can need ~6 GB. The 8 GB threshold
            # leaves runtime headroom for the new containers to start.
            AVAIL_GB=$(df -BG --output=avail / | tail -1 | tr -d 'G ')
            if [ "${AVAIL_GB:-0}" -lt 8 ]; then
              echo "::error::Available disk space ${AVAIL_GB} GB is below the 8 GB safe floor."
              echo "::error::Run on the server: docker system prune -af   (never pass --volumes)."
              exit 1
            fi
            echo "==> Disk preflight OK: ${AVAIL_GB} GB free"
            # ──────────────────────────────────────────────────────────

            export IMAGE_TAG="$NEW_TAG" REGISTRY IMAGE_PREFIX
            docker compose pull
            docker compose up -d --remove-orphans

            # Caddy mounts Caddyfile via volume bind; `docker compose up`
            # doesn't restart caddy when only its Caddyfile changed.
            # `caddy reload` re-reads the config without dropping connections.
            # The validate step before reload catches a malformed Caddyfile
            # so we don't leave Caddy stuck on the previous good config.
            if docker compose exec -T caddy caddy validate --config /etc/caddy/Caddyfile 2>&1; then
              docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile 2>&1 \
                && echo "✓ Caddy reloaded with new config" \
                || echo "⚠ caddy reload returned non-zero (continuing — verify with curl post-deploy)"
            else
              echo "⚠ caddy validate failed — Caddyfile not reloaded; previous good config still active"
            fi

            # Persist the new tag so the server's compose state is consistent
            # (so a later bare `docker compose up` won't silently revert).
            if grep -qE '^IMAGE_TAG=' .env 2>/dev/null; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$NEW_TAG|" .env
            else
              echo "IMAGE_TAG=$NEW_TAG" >> .env
            fi

            docker image prune -f --filter "until=24h"
            echo "==> Deploy complete ($NEW_TAG)"
          REMOTE

      - name: Post-deploy smoke gate — staging (G9)
        id: health-check
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
        run: |
          echo "Waiting for services to stabilize..."
          sleep 15

          # Phase 1: wait for /health (api process + DB + Redis)
          MAX_RETRIES=10
          RETRY_INTERVAL=10
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/health" || echo "000")
            echo "Attempt $i/$MAX_RETRIES — /health HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then break; fi
            if [ "$i" = "$MAX_RETRIES" ]; then
              echo "health=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            sleep $RETRY_INTERVAL
          done

          # Phase 2: full smoke suite. A smoke failure MUST also flag
          # health=failed so the rollback step below actually fires (the old
          # condition only caught /health timeouts, leaving broken deploys live).
          if bash scripts/server/smoke-staging.sh "$STAGING_URL"; then
            echo "health=ok" >> "$GITHUB_OUTPUT"
          else
            echo "health=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Rollback staging on failure
        if: failure() && steps.health-check.outputs.health == 'failed'
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          echo "::error::Staging health/smoke failed — rolling back to previous tag"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' REGISTRY='$REGISTRY' IMAGE_PREFIX='$IMAGE_PREFIX' bash -s" << 'REMOTE'
            set -euo pipefail
            cd "$DEPLOY_PATH"

            PREV_TAG="$(cat .deploy-prev-tag 2>/dev/null || true)"
            if [ -z "$PREV_TAG" ]; then
              echo "::error::No previous tag recorded — manual rollback required"
              exit 1
            fi
            echo "==> Rolling back to $PREV_TAG"

            export IMAGE_TAG="$PREV_TAG" REGISTRY IMAGE_PREFIX
            docker compose pull
            docker compose up -d --remove-orphans

            if grep -qE '^IMAGE_TAG=' .env 2>/dev/null; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$PREV_TAG|" .env
            fi
            echo "==> Rollback complete ($PREV_TAG)"
          REMOTE

  # ─────────────────────────────────────────────────────────────
  # 3. Deploy to Production
  #    Manual only (workflow_dispatch + environment=production) AND gated
  #    behind a green staging deploy (needs: deploy-staging) — production
  #    ALWAYS ships a build that already passed gates, images, and the full
  #    staging smoke. To ship to production: run the workflow manually with
  #    environment=production; it will build → deploy staging → deploy prod.
  # ─────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'production'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    env:
      IMAGE_TAG: sha-${{ github.sha }}

    steps:
      - name: Preflight — verify required production config
        env:
          PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
          PRODUCTION_HEALTH_URL: ${{ vars.PRODUCTION_HEALTH_URL }}
        run: |
          missing=()
          for v in PRODUCTION_SSH_KEY PRODUCTION_HOST PRODUCTION_USER PRODUCTION_DEPLOY_PATH PRODUCTION_URL PRODUCTION_HEALTH_URL; do
            if [ -z "${!v}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required production config: ${missing[*]}"
            echo "Set them under Settings → Environments → production — secrets:"
            echo "  PRODUCTION_SSH_KEY, PRODUCTION_HOST, PRODUCTION_USER, PRODUCTION_DEPLOY_PATH"
            echo "and variables: PRODUCTION_URL, PRODUCTION_HEALTH_URL."
            exit 1
          fi
          echo "✓ All required production secrets and variables are present."

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Add server to known hosts
        # See staging job above for the rationale: ssh-keyscan probes trigger
        # the server's fail2ban (sshd jail) and banhammer the runner IP.
        env:
          PRODUCTION_KNOWN_HOSTS: ${{ secrets.PRODUCTION_KNOWN_HOSTS }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "${PRODUCTION_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$PRODUCTION_KNOWN_HOSTS" >> ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts
            echo "✓ Used pre-baked PRODUCTION_KNOWN_HOSTS (no probing)."
          else
            cat >> ~/.ssh/config <<EOF
          Host ${PRODUCTION_HOST}
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
            ConnectTimeout 30
            ServerAliveInterval 30
            ServerAliveCountMax 3
          EOF
            chmod 600 ~/.ssh/config
            touch ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts
            echo "⚠ PRODUCTION_KNOWN_HOSTS secret not set — falling back to accept-new on first connect."
          fi

      - name: Warm up SSH (retry past residual fail2ban window)
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if ssh -o ConnectTimeout=30 -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" "echo ssh-ok"; then
              echo "✓ [PRODUCTION] SSH warmed up on attempt $attempt"
              exit 0
            fi
            wait_s=$((attempt * 30))
            echo "⚠ [PRODUCTION] SSH warmup attempt $attempt failed; sleeping ${wait_s}s"
            sleep "$wait_s"
          done
          echo "::error::[PRODUCTION] SSH warmup failed after 3 attempts"
          exit 1

      - name: Authenticate production server to GHCR
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" \
            | ssh -o ConnectTimeout=30 "$DEPLOY_USER@$DEPLOY_HOST" \
                "docker login ghcr.io -u ${{ github.actor }} --password-stdin"

      - name: Port ownership preflight (G7) — production
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "PROJECT=haa-production bash -s" << 'G7_EOF'
            set -euo pipefail
            echo "==> G7: asserting ports 80 / 443 / 5433 are free or owned by $PROJECT..."
            _failed=0
            # Ownership check uses Docker labels rather than text parsing
            # of `compose ps`. Labels are the canonical project-membership
            # marker in Compose v2; the previous grep against `compose ps`
            # text was fragile — a single-row port column line or a stopped
            # container made the regex miss `:80->` even when Caddy was
            # healthy and listening. Labels survive `docker container prune`,
            # restarts, and image upgrades, so the check stays accurate.
            for _p in 80 443 5433; do
              _busy=$(ss -Htlnp "sport = :${_p}" 2>/dev/null | head -1)
              if [ -z "$_busy" ]; then
                echo "  :${_p} — free"
              elif docker ps --filter "label=com.docker.compose.project=${PROJECT}" \
                     --format '{{.Ports}}' 2>/dev/null | grep -qE ":${_p}->"; then
                echo "  :${_p} — $PROJECT (OK)"
              else
                echo "G7 ERROR: port ${_p} is occupied by a foreign process:"
                ss -tlnp "sport = :${_p}" 2>/dev/null || true
                echo "  containers labelled $PROJECT currently listening:"
                docker ps --filter "label=com.docker.compose.project=${PROJECT}" \
                  --format '  {{.Names}}  {{.Ports}}' 2>/dev/null || true
                _failed=1
              fi
            done
            if [ "$_failed" -ne 0 ]; then
              echo "G7 preflight FAILED — identify and stop the conflicting process, then re-run deploy"
              exit 1
            fi
            echo "✓ G7: ports 80 / 443 / 5433 are clear"
          G7_EOF

      - name: Sync deploy config to production server
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_USER }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          scp -o BatchMode=yes deploy/production/Caddyfile "$DEPLOY_USER@$DEPLOY_HOST":"$DEPLOY_PATH/Caddyfile"
          scp -o BatchMode=yes deploy/production/docker-compose.yml "$DEPLOY_USER@$DEPLOY_HOST":"$DEPLOY_PATH/docker-compose.yml"
          echo "✓ Synced production Caddyfile + docker-compose.yml to $DEPLOY_PATH"

      - name: Deploy to production server
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_USER }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
          GIT_SHA: ${{ github.sha }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' NEW_TAG='sha-${GIT_SHA:0:7}' REGISTRY='$REGISTRY' IMAGE_PREFIX='$IMAGE_PREFIX' bash -s" << 'REMOTE'
            set -euo pipefail
            cd "$DEPLOY_PATH"

            PREV_TAG="$(grep -E '^IMAGE_TAG=' .env 2>/dev/null | cut -d= -f2- || true)"
            printf '%s\n' "${PREV_TAG:-}" > .deploy-prev-tag
            echo "==> [PRODUCTION] Previous: ${PREV_TAG:-<none>} | New: $NEW_TAG"

            cp docker-compose.yml docker-compose.yml.bak 2>/dev/null || true

            # ── [PRODUCTION] Disk preflight + safe cleanup (BEFORE pull) ──
            # Same rationale as the staging step above. Production is the
            # same class of host; rapid deploys accumulate images and the
            # legacy `--until=72h` post-deploy prune does not catch them.
            # Pruning containers / images / build cache / networks is safe;
            # `docker volume prune` and `--volumes` are NEVER used — postgres
            # data lives in a named volume.
            echo "==> [PRODUCTION] Disk state BEFORE cleanup"
            df -h / | awk 'NR==1 || $0 ~ "/$" {print}'
            docker system df 2>&1 || true

            echo "==> [PRODUCTION] Safe cleanup (volumes preserved)"
            docker container prune -f 2>&1 | tail -1
            docker image prune -af 2>&1 | tail -1
            docker builder prune -af 2>&1 | tail -1
            docker network prune -f 2>&1 | tail -1

            echo "==> [PRODUCTION] Disk state AFTER cleanup"
            df -h / | awk 'NR==1 || $0 ~ "/$" {print}'
            docker system df 2>&1 || true

            # Production gets a higher floor (12 GB) because a failed
            # mid-pull on production is a customer-facing outage; we'd
            # rather fail the deploy with a clear error than risk an OOM
            # extract that leaves containers half-recreated.
            AVAIL_GB=$(df -BG --output=avail / | tail -1 | tr -d 'G ')
            if [ "${AVAIL_GB:-0}" -lt 12 ]; then
              echo "::error::[PRODUCTION] Available disk ${AVAIL_GB} GB is below the 12 GB safe floor."
              echo "::error::Run on the server: docker system prune -af   (never pass --volumes)."
              exit 1
            fi
            echo "==> [PRODUCTION] Disk preflight OK: ${AVAIL_GB} GB free"
            # ──────────────────────────────────────────────────────────────

            export IMAGE_TAG="$NEW_TAG" REGISTRY IMAGE_PREFIX
            docker compose pull
            docker compose up -d --remove-orphans

            # Validate + reload Caddy so the newly-synced Caddyfile takes
            # effect without dropping connections. See staging job above.
            if docker compose exec -T caddy caddy validate --config /etc/caddy/Caddyfile 2>&1; then
              docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile 2>&1 \
                && echo "✓ [PRODUCTION] Caddy reloaded with new config" \
                || echo "⚠ [PRODUCTION] caddy reload returned non-zero — verify with curl"
            else
              echo "⚠ [PRODUCTION] caddy validate failed — Caddyfile not reloaded; previous good config still active"
            fi

            if grep -qE '^IMAGE_TAG=' .env 2>/dev/null; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$NEW_TAG|" .env
            else
              echo "IMAGE_TAG=$NEW_TAG" >> .env
            fi

            docker image prune -f --filter "until=72h"
            echo "==> [PRODUCTION] Deploy complete ($NEW_TAG)"
          REMOTE

      - name: Post-deploy smoke gate — production (G9)
        id: prod-health-check
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
          HEALTH_URL: ${{ vars.PRODUCTION_HEALTH_URL }}
        run: |
          echo "Waiting for services to stabilize..."
          sleep 20

          # Phase 1: wait for /health
          MAX_RETRIES=15
          RETRY_INTERVAL=15
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL/health" || echo "000")
            echo "Attempt $i/$MAX_RETRIES — /health HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then break; fi
            if [ "$i" = "$MAX_RETRIES" ]; then
              echo "health=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            sleep $RETRY_INTERVAL
          done

          # Phase 2: full smoke suite — same coverage as staging (HTML, routing,
          # payment-methods contract). Flags health=failed so rollback fires.
          if bash scripts/server/smoke-staging.sh "$PRODUCTION_URL"; then
            echo "health=ok" >> "$GITHUB_OUTPUT"
          else
            echo "health=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Rollback production on failure
        if: failure() && steps.prod-health-check.outputs.health == 'failed'
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_USER }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          echo "::error::PRODUCTION health/smoke failed — rolling back to previous tag"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' REGISTRY='$REGISTRY' IMAGE_PREFIX='$IMAGE_PREFIX' bash -s" << 'REMOTE'
            set -euo pipefail
            cd "$DEPLOY_PATH"

            PREV_TAG="$(cat .deploy-prev-tag 2>/dev/null || true)"
            if [ -z "$PREV_TAG" ]; then
              echo "::error::No previous tag recorded — manual rollback required"
              exit 1
            fi
            echo "==> [PRODUCTION] Rolling back to $PREV_TAG"

            export IMAGE_TAG="$PREV_TAG" REGISTRY IMAGE_PREFIX
            docker compose pull
            docker compose up -d --remove-orphans

            if grep -qE '^IMAGE_TAG=' .env 2>/dev/null; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$PREV_TAG|" .env
            fi
            echo "==> [PRODUCTION] Rollback complete ($PREV_TAG) — investigate immediately"
          REMOTE

      - name: Notify deployment result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::Production deployment successful — sha ${{ github.sha }}"
          else
            echo "::error::Production deployment FAILED — sha ${{ github.sha }}"
          fi
