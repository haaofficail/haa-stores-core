# ────────────────────────────────────────────────
# nginx config — Storefront SPA
# ────────────────────────────────────────────────

limit_conn_zone $binary_remote_addr zone=sf_conn:10m;
limit_req_zone  $binary_remote_addr zone=sf_req:10m rate=60r/s;

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip compression ─────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # ── Static assets: aggressive caching ────────
    # Vite content-hashes all bundles → immutable cache
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|avif)$ {
        expires           1y;
        add_header        Cache-Control "public, immutable";
        access_log        off;
    }

    # favicon / robots / sitemap: short cache
    location ~* \.(ico|txt|xml)$ {
        expires           7d;
        add_header        Cache-Control "public";
        access_log        off;
    }

    # ── index.html: never cache ───────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── SPA fallback — all routes → index.html ───
    location / {
        limit_conn  sf_conn 30;
        limit_req   zone=sf_req burst=100 nodelay;
        try_files   $uri $uri/ /index.html;
    }

    # ── Health probe ──────────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }

    server_tokens off;
}
