# ────────────────────────────────────────────────
# nginx config — Storefront SPA
# ────────────────────────────────────────────────

limit_conn_zone $binary_remote_addr zone=sf_conn:10m;
limit_req_zone  $binary_remote_addr zone=sf_req:10m rate=60r/s;

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # CSP: storefront accepts third-party payment scripts (Moyasar/HyperPay/Geidea
    # iframes for 3DS challenges) — kept in script-src + frame-src below. Tabby +
    # Tamara redirect rather than embed, so they don't appear here.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.moyasar.com https://cdn.geidea.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https:; frame-src 'self' https://api.moyasar.com https://api.merchant.geidea.net; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # ── Gzip compression ─────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # ── Static assets: tiered caching ────────────
    # Vite content-hashes its bundles — `/assets/<name>-<HASH>.<ext>`.
    # The hash IS the cache key, so we serve these with a long
    # immutable cache. This pattern is intentionally narrow so
    # public/* assets (logos, payment-logos, favicons) DON'T match
    # and don't get pinned for a year (see PR #255 + #178: a year-long
    # nginx cache on payment-logos/apple-pay.svg + Caddy adding its
    # own header produced a duplicated, contradictory Cache-Control
    # that kept browsers on stale SVGs after a redeploy).
    location ~* ^/assets/[^/]+-[A-Za-z0-9_-]{8,}\.(js|css|woff2?|ttf|eot|otf|map)$ {
        expires           1y;
        add_header        Cache-Control "public, immutable";
        access_log        off;
    }

    # Unhashed public assets (logos, payment-logos, product imagery)
    # — short cache so a re-deploy of an SVG/PNG propagates within
    # minutes, not days. Caddy's front layer also sets the same
    # header (PR #255); the two values are intentionally identical
    # so a future drift produces a single Cache-Control on the wire.
    location ~* \.(svg|png|jpg|jpeg|gif|webp|avif)$ {
        expires           5m;
        add_header        Cache-Control "public, max-age=300, must-revalidate";
        access_log        off;
    }

    # favicon / robots / sitemap: short cache
    location ~* \.(ico|txt|xml)$ {
        expires           7d;
        add_header        Cache-Control "public";
        access_log        off;
    }

    # ── index.html: never cache ───────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── SPA fallback — all routes → index.html ───
    location / {
        limit_conn  sf_conn 30;
        limit_req   zone=sf_req burst=100 nodelay;
        try_files   $uri $uri/ /index.html;
    }

    # ── Health probe ──────────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }

    server_tokens off;
}
