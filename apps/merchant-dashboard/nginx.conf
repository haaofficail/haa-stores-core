# ────────────────────────────────────────────────
# nginx config — Merchant Dashboard SPA
# ────────────────────────────────────────────────

# Limit connections per IP
limit_conn_zone $binary_remote_addr zone=merchant_conn:10m;
limit_req_zone  $binary_remote_addr zone=merchant_req:10m rate=30r/s;

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────
    # HSTS: force https for one year, include subdomains, eligible for preload list.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # COOP isolates this top-level browsing context from cross-origin openers
    # (mitigates XS-Leaks and Spectre-style side-channel attacks).
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # CSP: SPA-friendly policy. 'unsafe-inline' is required by Vite's runtime
    # style injection; 'unsafe-eval' is intentionally NOT allowed. /api is the
    # same-origin endpoint exposed by Caddy on the same host.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # ── Gzip compression ─────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # ── Static assets: tiered caching (see storefront/nginx.conf
    # for the rationale — pinning unhashed public/* SVGs for a year
    # produces duplicated, contradictory Cache-Control when Caddy
    # adds its own header, and keeps browsers on stale assets after
    # a re-deploy).
    location ~* ^/assets/[^/]+-[A-Za-z0-9_-]{8,}\.(js|css|woff2?|ttf|eot|otf|map)$ {
        expires           1y;
        add_header        Cache-Control "public, immutable";
        access_log        off;
    }
    location ~* \.(svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires           5m;
        add_header        Cache-Control "public, max-age=300, must-revalidate";
        access_log        off;
    }

    # ── index.html: never cache (SPA entry point) ─
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── SPA fallback — all routes → index.html ───
    location / {
        limit_conn  merchant_conn 20;
        limit_req   zone=merchant_req burst=50 nodelay;
        try_files   $uri $uri/ /index.html;
    }

    # ── Health probe ──────────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }

    # Disable server tokens
    server_tokens off;
}
