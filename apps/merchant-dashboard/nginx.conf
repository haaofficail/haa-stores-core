# ────────────────────────────────────────────────
# nginx config — Merchant Dashboard SPA
# ────────────────────────────────────────────────

# Limit connections per IP
limit_conn_zone $binary_remote_addr zone=merchant_conn:10m;
limit_req_zone  $binary_remote_addr zone=merchant_req:10m rate=30r/s;

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip compression ─────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # ── Static assets: long-lived cache ──────────
    # Vite fingerprints JS/CSS with content hashes → safe to cache 1 year
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires           1y;
        add_header        Cache-Control "public, immutable";
        access_log        off;
    }

    # ── index.html: never cache (SPA entry point) ─
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── SPA fallback — all routes → index.html ───
    location / {
        limit_conn  merchant_conn 20;
        limit_req   zone=merchant_req burst=50 nodelay;
        try_files   $uri $uri/ /index.html;
    }

    # ── Health probe ──────────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }

    # Disable server tokens
    server_tokens off;
}
