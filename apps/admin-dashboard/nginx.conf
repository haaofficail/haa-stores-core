# ────────────────────────────────────────────────
# nginx config — Admin Dashboard SPA
# ────────────────────────────────────────────────

limit_conn_zone $binary_remote_addr zone=admin_conn:10m;
limit_req_zone  $binary_remote_addr zone=admin_req:10m rate=20r/s;

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers (stricter for admin) ─────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                  always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "no-referrer"           always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # CSP: admin keeps the strictest connect-src — same-origin only.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Gzip compression ─────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # ── Static assets: long-lived cache ──────────
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires           1y;
        add_header        Cache-Control "public, immutable";
        access_log        off;
    }

    # ── index.html: never cache ───────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── SPA fallback ──────────────────────────────
    location / {
        limit_conn  admin_conn 10;
        limit_req   zone=admin_req burst=20 nodelay;
        try_files   $uri $uri/ /index.html;
    }

    # ── Health probe ──────────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }

    server_tokens off;
}
